<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Health Guide | Premium Health Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(to right, #14B8A6, #06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-on { box-shadow: 0 0 15px #22c55e; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-80 glass border-r border-white/10 p-6 flex flex-col">
        <h1 class="text-2xl font-bold gradient-text mb-10 tracking-tight">NutriVerse AI</h1>
        
        <div class="mb-8 p-4 rounded-xl bg-white/5 border border-white/10">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] uppercase font-bold text-slate-400">Gemini API Key</span>
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
            </div>
            <input type="password" id="api-key" placeholder="Enter API Key" class="w-full bg-transparent border-b border-white/20 text-xs mb-3 focus:outline-none focus:border-teal-500">
            <button onclick="connectAPI()" class="w-full py-2 bg-teal-600 hover:bg-teal-500 rounded-lg text-[10px] font-bold transition-all">CONNECT API</button>
        </div>

        <nav class="space-y-2 flex-1 custom-scrollbar overflow-y-auto">
            <p class="text-[10px] uppercase text-slate-500 font-bold px-2 mb-4">Notebooks</p>
            <a class="flex items-center gap-3 p-3 rounded-lg bg-white/5 text-teal-400 cursor-pointer"><i class="ph-fill ph-heartbeat"></i> Health Reports</a>
            <a class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition cursor-pointer"><i class="ph ph-bowl-food"></i> Nutrition Plans</a>
            <a class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition cursor-pointer"><i class="ph ph-activity"></i> Fitness Tracker</a>
        </nav>
    </aside>

    <!-- Workspace -->
    <main class="flex-1 flex flex-col p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-bold">Health Dashboard</h2>
                <p class="text-slate-400 text-sm mt-1">Real-time analysis powered by Gemini Flash.</p>
            </div>
            <div class="flex gap-3">
                <input type="file" id="pdf-input" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdf-input').click()" class="px-5 py-2 glass rounded-xl text-xs font-bold hover:bg-white/10 transition flex items-center gap-2">
                    <i class="ph ph-upload"></i> UPLOAD PDF
                </button>
                <button id="voice-btn" class="px-5 py-2 glass rounded-xl text-xs font-bold text-teal-400 transition flex items-center gap-2">
                    <i class="ph ph-microphone"></i> VOICE
                </button>
            </div>
        </header>

        <section id="source-list" class="grid grid-cols-4 gap-4 mb-8">
            <!-- Dynamic PDF cards injected here -->
        </section>

        <!-- Chat Panel -->
        <div id="chat-box" class="glass h-64 p-6 rounded-2xl overflow-y-auto mb-6 custom-scrollbar space-y-4">
            <div class="text-teal-400 text-sm">NutriVerse Copilot: Ready to analyze your data. Connect your API to begin.</div>
        </div>

        <div class="glass p-2 rounded-2xl flex items-center">
            <input type="text" id="chat-input" placeholder="Ask about your reports, nutrition, or blood work..." class="flex-1 bg-transparent px-4 text-sm focus:outline-none">
            <button onclick="sendMessage()" class="p-3 bg-teal-600 rounded-xl hover:bg-teal-500"><i class="ph ph-paper-plane-right"></i></button>
        </div>
    </main>

    <script>
        // API CONNECTION
        function connectAPI() {
            const key = document.getElementById('api-key').value;
            const dot = document.getElementById('status-dot');
            if(key.length > 5) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 status-on';
                appendChat("System: API Connected successfully.");
            } else {
                alert("Please enter a valid API key.");
            }
        }

        // CHAT LOGIC
        function appendChat(msg) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="text-sm border-l-2 border-teal-500 pl-3">${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value) {
                appendChat(`You: ${input.value}`);
                input.value = "";
            }
        }

        // PDF UPLOAD
        document.getElementById('pdf-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const list = document.getElementById('source-list');
            list.innerHTML += `<div class="glass p-4 rounded-xl border border-teal-500/30 text-center"><i class="ph-fill ph-file-pdf text-2xl text-red-400"></i><p class="text-[10px] mt-2 truncate">${file.name}</p></div>`;
            appendChat(`System: Document "${file.name}" indexed successfully.`);
        });

        // VOICE ENGINE
        const voiceBtn = document.getElementById('voice-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            voiceBtn.onclick = () => {
                recognition.start();
                voiceBtn.classList.add('text-red-500');
            };
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                appendChat(`Voice Input: ${text}`);
                voiceBtn.classList.remove('text-red-500');
            };
            recognition.onerror = () => voiceBtn.classList.remove('text-red-500');
        } else {
            voiceBtn.onclick = () => alert("Voice recognition is not supported in this browser.");
            voiceBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>
